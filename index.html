<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KEANN MARKET</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0a0a0a,#1b1b1b);
  color:white;
}

/* HEADER */
header{
  padding:40px 20px;
  text-align:center;
  background:#111;
  border-bottom:1px solid #333;
}

h1{
  margin:0;
  font-size:38px;
  letter-spacing:3px;
}

p{color:#aaa}

/* SEARCH */
.search{
  margin-top:15px;
}

.search input{
  padding:10px;
  width:250px;
  border:none;
  border-radius:8px;
}

/* GRID */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:30px;
}

/* CARD */
.card{
  width:240px;
  background:#1e1e1e;
  border-radius:15px;
  padding:15px;
  transition:0.3s;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card:hover{
  transform:translateY(-6px);
  background:#2a2a2a;
}

.card img{
  width:100%;
  border-radius:10px;
}

.price{
  color:#00e676;
  font-weight:bold;
  margin:8px 0;
}

/* BUTTON */
.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.btn:hover{
  background:#00e676;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#1e1e1e;
  padding:20px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

.close{
  float:right;
  cursor:pointer;
  color:red;
  font-weight:bold;
}

.wa{
  display:inline-block;
  margin-top:10px;
  padding:10px;
  background:#25D366;
  color:white;
  border-radius:8px;
  text-decoration:none;
}

footer{
  text-align:center;
  color:#666;
  padding:20px;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <h1>🔥 KEANN MARKET</h1>
  <p>Premium Digital Store</p>

  <div class="search">
    <input type="text" id="search" onkeyup="filter()" placeholder="Cari layanan...">
  </div>
</header>

<div class="container" id="list">

<!-- CARD 1 -->
<div class="card item">
  <img src="https://i.imgur.com/8Km9tLL.jpg">
  <h3>🤖 Bot WhatsApp</h3>
  <div class="price">Rp 10.000</div>
  <button class="btn" onclick="openOrder('Sewa Bot WhatsApp - 1 Minggu')">ORDER</button>
</div>

<!-- CARD 2 -->
<div class="card item">
  <img src="https://i.imgur.com/3ZQ3Z5G.jpg">
  <h3>📱 Nokos WA</h3>
  <div class="price">Rp 5.000</div>
  <button class="btn" onclick="openOrder('Nokos WhatsApp')">ORDER</button>
</div>

<!-- CARD 3 -->
<div class="card item">
  <img src="https://i.imgur.com/7yUvePI.jpg">
  <h3>⚙️ Web Suntik</h3>
  <div class="price">Rp 15.000</div>
  <button class="btn" onclick="openOrder('Web Suntik')">ORDER</button>
</div>

<!-- CARD 4 -->
<div class="card item">
  <img src="https://i.imgur.com/l4XzYpG.jpg">
  <h3>🎮 Topup Game</h3>
  <div class="price">Mulai Rp 3.000</div>
  <button class="btn" onclick="openOrder('Topup Game')">ORDER</button>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">X</span>
    <h3 id="title"></h3>
    <p>Konfirmasi order via WhatsApp</p>
    <a id="waLink" class="wa" target="_blank">LANJUT KE WHATSAPP</a>
  </div>
</div>

<footer>© KEANN MARKET</footer>

<script>
let nomor = "628125895306";

function openOrder(product){
  document.getElementById("modal").style.display="flex";
  document.getElementById("title").innerText = product;

  let pesan = "Halo admin KEANN MARKET, saya mau order:\n" + product;
  let url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

  document.getElementById("waLink").href = url;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function filter(){
  let input = document.getElementById("search").value.toLowerCase();
  let items = document.getElementsByClassName("item");

  for(let i=0;i<items.length;i++){
    let text = items[i].innerText.toLowerCase();
    items[i].style.display = text.includes(input) ? "block":"none";
  }
}
</script>

</body>
</html>
