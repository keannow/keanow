<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>KEANN MARKET</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#0d0d0d,#1c1c1c);
      color:white;
      text-align:center;
    }

    header{
      padding:40px 20px;
      background:#111;
      border-bottom:1px solid #333;
    }

    h1{
      margin:0;
      font-size:34px;
      letter-spacing:2px;
    }

    p{
      color:#aaa;
      margin-top:5px;
    }

    .wa-btn{
      display:inline-block;
      margin-top:15px;
      padding:12px 18px;
      background:#25D366;
      color:white;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
    }

    .wa-btn:hover{
      background:#1ebe5d;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      padding:30px;
      gap:15px;
    }

    .card{
      background:#1e1e1e;
      padding:20px;
      width:220px;
      border-radius:15px;
      transition:0.3s;
      box-shadow:0 0 10px rgba(0,0,0,0.5);
    }

    .card:hover{
      transform:translateY(-6px);
      background:#2a2a2a;
    }

    .btn{
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      color:white;
      background:#00c853;
      width:100%;
      font-weight:bold;
    }

    .btn:hover{
      background:#00e676;
    }

    footer{
      margin-top:30px;
      padding:15px;
      font-size:12px;
      color:#666;
    }

  </style>
</head>

<body>

<header>
  <h1>🔥 KEANN MARKET</h1>
  <p>Digital Store • Topup • Services</p>

  <a class="wa-btn" href="https://wa.me/628125895306" target="_blank">
    💬 Chat Admin WhatsApp
  </a>
</header>

<h2>📌 Layanan Kami</h2>

<div class="container">

  <div class="card">
    <h3>🤖 Sewa Bot WA</h3>
    <button class="btn" onclick="order('Sewa Bot WhatsApp')">ORDER</button>
  </div>

  <div class="card">
    <h3>📱 Nokos WhatsApp</h3>
    <button class="btn" onclick="order('Nokos WhatsApp')">ORDER</button>
  </div>

  <div class="card">
    <h3>⚙️ Web Suntik</h3>
    <button class="btn" onclick="order('Web Suntik')">ORDER</button>
  </div>

  <div class="card">
    <h3>🎮 Topup Game</h3>
    <button class="btn" onclick="order('Topup Game')">ORDER</button>
  </div>

</div>

<footer>
  © KEANN MARKET - All Rights Reserved
</footer>

<script>
function order(product){
  let nomor = "628125895306";
  let pesan = "Halo admin KEANN MARKET, saya mau order: " + product;
  let url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);
  window.open(url, "_blank");
}
</script>

</body>
</html>
