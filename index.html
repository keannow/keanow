<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KEANN MARKET</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 25px;
  background:#111;
  border-bottom:1px solid #222;
}

.logo{
  font-weight:bold;
  letter-spacing:2px;
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px;
}

.hero h1{
  font-size:40px;
  margin:0;
}

.hero p{
  color:#aaa;
}

.cta{
  display:inline-block;
  margin-top:15px;
  padding:12px 18px;
  background:#25D366;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

/* TAB MENU */
.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px 0;
  flex-wrap:wrap;
}

.tab{
  padding:10px 15px;
  background:#1a1a1a;
  border:1px solid #333;
  border-radius:8px;
  cursor:pointer;
  color:#aaa;
}

.tab.active{
  background:#00c853;
  color:white;
}

/* CONTENT */
.container{
  display:none;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:20px;
}

.container.active{
  display:flex;
}

/* CARD */
.card{
  width:240px;
  background:#161616;
  padding:20px;
  border-radius:14px;
  border:1px solid #222;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  background:#1f1f1f;
}

.note{
  font-size:12px;
  color:#888;
}

select{
  width:100%;
  padding:8px;
  border-radius:8px;
  margin-top:10px;
  background:#111;
  color:white;
  border:1px solid #333;
}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.btn:hover{
  background:#00e676;
}

footer{
  text-align:center;
  padding:20px;
  color:#666;
  font-size:12px;
  border-top:1px solid #222;
  margin-top:30px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">KEANN MARKET</div>
</nav>

<div class="hero">
  <h1>KEANN MARKET</h1>
  <p>Marketplace Digital • Bot • Nokos • Tools</p>

  <a class="cta" href="https://wa.me/628125895306" target="_blank">
    💬 Chat Admin
  </a>
</div>

<!-- TAB -->
<div class="tabs">
  <div class="tab active" onclick="showTab('bot')">Bot</div>
  <div class="tab" onclick="showTab('drip')">Drip</div>
  <div class="tab" onclick="showTab('mobi')">Mobi</div>
  <div class="tab" onclick="showTab('tools')">Tools</div>
</div>

<!-- BOT -->
<div id="bot" class="container active">

  <div class="card">
    <h3>🤖 Bot WA</h3>
    <div class="note">Pilih paket</div>

    <select id="botSelect">
      <option value="Bot 1 Hari - 2K">1 Hari - 2K</option>
      <option value="Bot 7 Hari - 5K">7 Hari - 5K</option>
      <option value="Bot 30 Hari - 8K">30 Hari - 8K</option>
      <option value="Bot Permanen - 15K">Permanen - 15K</option>
    </select>

    <button class="btn" onclick="orderBot()">ORDER</button>
  </div>

</div>

<!-- DRIP -->
<div id="drip" class="container">

  <div class="card">
    <h3>🔑 DRIP KEY</h3>

    <select id="dripSelect">
      <option value="DRIP 1D - 25K">1 Hari - 25K</option>
      <option value="DRIP 3D - 40K">3 Hari - 40K</option>
      <option value="DRIP 7D - 65K">7 Hari - 65K</option>
      <option value="DRIP 15D - 90K">15 Hari - 90K</option>
      <option value="DRIP 30D - 140K">30 Hari - 140K</option>
    </select>

    <button class="btn" onclick="orderDrip()">ORDER</button>
  </div>

</div>

<!-- MOBI -->
<div id="mobi" class="container">

  <div class="card">
    <h3>📦 MOBI</h3>

    <select id="mobiSelect">
      <option value="MOBI Permanen - 10K">Permanen - 10K</option>
      <option value="SET MOBI FF - 15K">SET FF - 15K</option>
    </select>

    <button class="btn" onclick="orderMobi()">ORDER</button>
  </div>

  <div class="card">
    <h3>💳 QRIS NO KTP</h3>
    <div class="note">Tanpa verifikasi</div>
    <button class="btn" onclick="order('QRIS NO KTP - 5K')">ORDER</button>
  </div>

</div>

<!-- TOOLS -->
<div id="tools" class="container">

  <div class="card">
    <h3>📱 Nokos</h3>
    <button class="btn" onclick="order('Nokos WA')">ORDER</button>
  </div>

  <div class="card">
    <h3>⚙️ Web Suntik</h3>
    <button class="btn" onclick="order('Web Suntik')">ORDER</button>
  </div>

  <div class="card">
    <h3>📡 Jasapost</h3>
    <button class="btn" onclick="order('Jasapost FREE')">ORDER</button>
  </div>

</div>

<footer>
  © KEANN MARKET — Marketplace Pro UI
</footer>

<script>
let nomor = "628125895306";

function order(text){
  let pesan = `woi keann\n\ngua mau order\n${text}`;
  window.open("https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan));
}

function orderBot(){
  order(document.getElementById("botSelect").value);
}

function orderDrip(){
  order(document.getElementById("dripSelect").value);
}

function orderMobi(){
  order(document.getElementById("mobiSelect").value);
}

/* TAB SYSTEM */
function showTab(id){
  document.querySelectorAll(".container").forEach(e=>e.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}
</script>

</body>
</html>
