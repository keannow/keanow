<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Keann Market</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
      text-align:center;
    }

    header{
      padding:30px;
      background:#1c1c1c;
    }

    h1{
      margin:0;
    }

    p{
      margin:5px 0;
      color:#aaa;
    }

    .wa-btn{
      display:inline-block;
      margin-top:15px;
      padding:12px 18px;
      background:#25D366;
      color:white;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
    }

    .wa-btn:hover{
      background:#1ebe5d;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      padding:20px;
      gap:15px;
    }

    .card{
      background:#1f1f1f;
      padding:20px;
      width:200px;
      border-radius:12px;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
      background:#2a2a2a;
    }

    .btn{
      margin-top:10px;
      padding:8px 12px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      color:white;
      background:#00c853;
    }

    .btn:hover{
      background:#00e676;
    }

  </style>
</head>

<body>

<header>
  <h1>🔥 KEANN MARKET</h1>
  <p>Topup & Digital Services</p>

  <!-- WHATSAPP BUTTON -->
  <a class="wa-btn" href="https://wa.me/628125895306" target="_blank">
    💬 Chat WhatsApp Admin
  </a>
</header>

<h2>📌 Layanan Kami</h2>

<div class="container">

  <div class="card">
    <h3>🤖 Sewa Bot WA</h3>
    <button class="btn">Order</button>
  </div>

  <div class="card">
    <h3>📱 Nokos WA</h3>
    <button class="btn">Order</button>
  </div>

  <div class="card">
    <h3>⚙️ Web Suntik</h3>
    <button class="btn">Order</button>
  </div>

  <div class="card">
    <h3>🎮 Topup Game</h3>
    <button class="btn">Order</button>
  </div>

</div>

</body>
</html>
